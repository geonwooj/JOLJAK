<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>AI Patent Office • 회원가입</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="stylesheet" href="../css/modal.css" />
  </head>

  <body>
    <div class="login-container">
      <div class="login-header">
        <a href="../index.html" class="logo-link">
          <div class="logo">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              class="logo-svg"
              aria-hidden="true"
            >
              <path
                d="M12 2l1.8 4.6L18 8l-4.2 1.4L12 14l-1.8-4.6L6 8l4.2-1.4L12 2Z"
                fill="currentColor"
              />
              <path
                d="M19 5l.8 2 .2.2 2 .8-2 .8-.2.2-.8 2-.8-2-.2-.2-2-.8 2-.8.2-.2.8-2Z"
                fill="currentColor"
              />
            </svg>
          </div>
          <h1>AI Patent Office</h1>
        </a>
        <p>계정을 만들어 시작하세요</p>
      </div>

      <form class="login-form">
        <label>
          이름
          <input
            type="text"
            class="input"
            id="nameInput"
            placeholder="홍길동"
          />
        </label>

        <div class="row">
          <span class="label">이메일</span>
          <input
            type="email"
            class="input"
            id="emailInput"
            placeholder="example@email.com"
            style="flex: 1; min-width: 180px"
          />
          <button
            type="button"
            class="btn-primary"
            id="sendCodeBtn"
            style="white-space: nowrap"
          >
            이메일 인증
          </button>
        </div>

        <div class="row" id="verifyBox" style="display: none">
          <span class="label">인증코드</span>
          <input
            type="text"
            class="input"
            id="codeInput"
            placeholder="6자리 숫자"
            maxlength="6"
            style="flex: 1; min-width: 180px"
          />
          <button
            type="button"
            class="btn-primary"
            id="verifyCodeBtn"
            style="white-space: nowrap"
          >
            확인
          </button>
        </div>

        <p id="verifyStatus" style="margin-top: 6px; font-size: 13px"></p>

        <label>
          비밀번호
          <input
            type="password"
            class="input"
            id="passwordInput"
            placeholder="8자 이상, 영문/숫자/특수문자 포함"
          />
        </label>
        <p
          id="pwHint"
          style="
            margin: 6px 0 10px;
            font-size: 12px;
            color: crimson;
            display: none;
          "
        >
          비밀번호는 8자 이상이며 영문/숫자/특수문자를 포함해야 합니다.
        </p>

        <label>
          비밀번호 확인
          <input
            type="password"
            class="input"
            id="passwordConfirmInput"
            placeholder="비밀번호를 다시 입력"
          />
        </label>
        <p
          id="pwMatchHint"
          style="
            margin: 6px 0 10px;
            font-size: 12px;
            color: crimson;
            display: none;
          "
        >
          비밀번호가 일치하지 않습니다.
        </p>

        <!-- ✅ 버튼은 항상 활성(클릭 가능). 대신 조건 미충족이면 안내 보여주고 return -->
        <button type="submit" class="btn-primary" id="signupBtn">
          회원가입
        </button>
      </form>

      <div class="login-footer">
        <span>이미 계정이 있으신가요?</span>
        <a href="./login.html" class="link">로그인</a>
      </div>
    </div>

    <!-- ✅ modal 먼저 -->
    <script src="../js/modal.js"></script>
    <script src="../js/signup.js"></script>
  </body>
</html>
