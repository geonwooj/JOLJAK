<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Patent Office • 비밀번호 찾기</title>

    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="stylesheet" href="../css/modal.css" />
  </head>

  <body>
    <div class="login-container">
      <!-- Header (로그인과 동일 구조) -->
      <div class="login-header">
        <a href="../index.html" class="logo-link">
          <div class="logo">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              class="logo-svg"
              aria-hidden="true"
            >
              <path
                d="M12 2l1.8 4.6L18 8l-4.2 1.4L12 14l-1.8-4.6L6 8l4.2-1.4L12 2Z"
                fill="currentColor"
              />
              <path
                d="M19 5l.8 2 .2.2 2 .8-2 .8-.2.2-.8 2-.8-2-.2-.2-2-.8 2-.8.2-.2.8-2Z"
                fill="currentColor"
              />
            </svg>
          </div>
          <h1>AI Patent Office</h1>
        </a>
        <p>비밀번호를 재설정하세요</p>
      </div>

      <!-- Form -->
      <form class="login-form" id="forgotForm">
        <label>
          이메일
          <input
            type="email"
            class="input"
            id="emailInput"
            placeholder="example@email.com"
          />
        </label>

        <button type="submit" class="btn-primary">재설정 링크 보내기</button>

        <div style="margin-top: 12px; text-align: right">
          <a href="./login.html" class="link">로그인으로 돌아가기</a>
        </div>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <span>계정이 없으신가요?</span>
        <a href="./signup.html" class="link">회원가입</a>
      </div>
    </div>

    <script src="../js/forgot.js"></script>
    <script src="../js/modal.js"></script>
  </body>
</html>
